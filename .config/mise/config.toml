[tools]
"github:simonw/rodney" = "latest"
"github:simonw/showboat" = "latest"
node = "25.2.1"

[env]
_.file = ".env"

[tasks."dev:website"]
description = "Run the website in development mode"
run = "pnpm run dev:website"
alias = "dev-website"

[tasks."dev:tv"]
description = "Run the TV in development mode"
run = "pnpm run dev:tv"
alias = "dev-tv"

[tasks.lint]
description = "Run the linter"
run = "pnpm run lint"
alias = "lint"

[tasks.build]
description = "Build all projects"
run = "pnpm run build"
alias = "build"

[tasks."build:website"]
description = "Build the website project"
run = "pnpm run build:website"
alias = "build-website"

[tasks."build:tv"]
description = "Build the TV project"
run = "pnpm run build:tv"
alias = "build-tv"

[tasks."docker:context"]
description = "Starts `ncdu` with patterns specified in `.dockerignore` excluded."
run = "ncdu -X .dockerignore"

[tasks."generate:types"]
description = "Generate Types from the Directus Schema"
run = "pnpm run generate:types"

[tasks."email:parse"]
description = "Parse a Postmark inbound email webhook payload"
run = "cd packages/email && npx tsx scripts/test-parse.ts {{option(name='file')}}"

[tasks."test:postmark-webhook"]
description = "Send a test Postmark inbound webhook to the local dev server"
run = """
curl -s -w '\n%{http_code}' \
  -X POST \
  -u "${POSTMARK_WEBHOOK_USERNAME}:${POSTMARK_WEBHOOK_PASSWORD}" \
  -H 'Content-Type: application/json' \
  -d @packages/email/fixtures/postmark-apple-mail-macos-forward.json \
  http://localhost:3000/api/webhooks/postmark
"""
