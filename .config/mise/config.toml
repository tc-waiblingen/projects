[tools]
node = "25.2.1"

[env]
_.file = ".env"

[tasks."dev:website"]
description = "Run the website in development mode"
run = "pnpm"
args = ["run", "dev:website"]

[tasks."dev:tv"]
description = "Run the TV in development mode"
run = "pnpm"
args = ["run", "dev:tv"]

[tasks.lint]
description = "Run the linter"
run = "pnpm"
args = ["run", "lint"]

[tasks.build]
description = "Build all projects"
run = "pnpm"
args = ["run", "build"]
