<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Gradient for backgrounds -->
    <radialGradient id="bgGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#DDD5C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0C4A8;stop-opacity:1" />
    </radialGradient>
    <!-- Face gradient -->
    <radialGradient id="faceGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#DDD5C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0C4A8;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Information sign above counter -->
  <g transform="translate(200, 70)">
    <!-- Sign background (rounded rectangle) -->
    <rect x="-60" y="-25" width="120" height="50" rx="6" ry="6"
          fill="url(#bgGradient)" stroke="#887050" stroke-width="3"/>

    <!-- Information "i" symbol -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#887050" stroke-width="3"/>

    <!-- Dot of "i" -->
    <circle cx="0" cy="-10" r="4" fill="#887050"/>

    <!-- Stem of "i" -->
    <rect x="-3" y="0" width="6" height="18" rx="1" ry="1"
          fill="#887050" stroke="none"/>
  </g>

  <!-- Service counter -->
  <g transform="translate(200, 190)">
    <!-- Counter top -->
    <path d="M -130 0 L 130 0 L 120 8 L -120 8 Z"
          fill="url(#bgGradient)" stroke="#887050" stroke-width="3"/>

    <!-- Counter front face -->
    <rect x="-120" y="8" width="240" height="50" rx="2" ry="2"
          fill="url(#bgGradient)" stroke="#887050" stroke-width="3"/>

    <!-- Counter detail line -->
    <line x1="-120" y1="33" x2="120" y2="33" stroke="#887050" stroke-width="2" opacity="0.4"/>

    <!-- Items on counter -->
    <!-- Clipboard with forms (left side) -->
    <g transform="translate(-70, -12)">
      <!-- Clipboard -->
      <rect x="-12" y="0" width="24" height="18" rx="1" ry="1"
            fill="#A89878" stroke="#887050" stroke-width="2"/>
      <!-- Clip at top -->
      <rect x="-6" y="-2" width="12" height="4" rx="1" ry="1"
            fill="#887050" stroke="#887050" stroke-width="1"/>
      <!-- Lines on paper -->
      <line x1="-8" y1="5" x2="8" y2="5" stroke="#887050" stroke-width="1"/>
      <line x1="-8" y1="9" x2="8" y2="9" stroke="#887050" stroke-width="1"/>
      <line x1="-8" y1="13" x2="5" y2="13" stroke="#887050" stroke-width="1"/>
    </g>

    <!-- Phone (right side) -->
    <g transform="translate(70, -8)">
      <!-- Phone base -->
      <rect x="-15" y="8" width="30" height="10" rx="2" ry="2"
            fill="url(#bgGradient)" stroke="#887050" stroke-width="2"/>
      <!-- Handset -->
      <path d="M -8 0 Q -8 -4, -4 -4 L 4 -4 Q 8 -4, 8 0 L 8 8 Q 8 12, 4 12 L -4 12 Q -8 12, -8 8 Z"
            fill="#A89878" stroke="#887050" stroke-width="2"/>
      <!-- Handset details -->
      <circle cx="-3" cy="2" r="1.5" fill="#887050"/>
      <circle cx="3" cy="2" r="1.5" fill="#887050"/>
      <circle cx="-3" cy="6" r="1.5" fill="#887050"/>
      <circle cx="3" cy="6" r="1.5" fill="#887050"/>
    </g>

    <!-- Bell (center) -->
    <g transform="translate(0, -10)">
      <!-- Bell shape -->
      <path d="M -8 8 Q -8 0, 0 -6 Q 8 0, 8 8 L -8 8"
            fill="url(#bgGradient)" stroke="#887050" stroke-width="2"/>
      <!-- Bell clapper -->
      <circle cx="0" cy="6" r="2" fill="#887050"/>
      <!-- Bell top -->
      <rect x="-2" y="-8" width="4" height="3" rx="1" ry="1"
            fill="#887050" stroke="#887050" stroke-width="1"/>
    </g>
  </g>

  <!-- Person behind counter -->
  <g transform="translate(200, 160)">
    <!-- Head -->
    <circle cx="0" cy="0" r="18" fill="url(#faceGradient)" stroke="#887050" stroke-width="2.5"/>

    <!-- Short hair -->
    <path d="M -15 -5 Q -17 -12, -12 -16 Q -5 -18, 0 -18 Q 5 -18, 12 -16 Q 17 -12, 15 -5"
          fill="none" stroke="#887050" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Eyes -->
    <circle cx="-5" cy="-2" r="1.5" fill="#887050"/>
    <circle cx="5" cy="-2" r="1.5" fill="#887050"/>

    <!-- Smile -->
    <path d="M -6 5 Q 0 9, 6 5" fill="none" stroke="#887050" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Neck/torso -->
    <line x1="-4" y1="18" x2="-4" y2="30" stroke="#887050" stroke-width="2.5"/>
    <line x1="4" y1="18" x2="4" y2="30" stroke="#887050" stroke-width="2.5"/>

    <!-- Shoulders/shirt -->
    <path d="M -4 22 L -15 28 M 4 22 L 15 28" fill="none" stroke="#887050" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -15 28 Q 0 30, 15 28" fill="#A89878" stroke="#887050" stroke-width="2.5"/>
  </g>
</svg>
