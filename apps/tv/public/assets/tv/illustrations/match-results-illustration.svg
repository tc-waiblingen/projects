<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Gradient for backgrounds -->
    <radialGradient id="bgGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#DDD5C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0C4A8;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Left tennis racket (hand-drawn style) -->
  <g transform="translate(100, 150) rotate(-20)">
    <!-- Racket head - slightly imperfect oval -->
    <path d="M -35,-2 Q -36,-20 -32,-38 Q -20,-48 0,-49 Q 20,-48 32,-38 Q 36,-20 35,-2 Q 36,16 32,34 Q 20,44 0,45 Q -20,44 -32,34 Q -36,16 -35,-2"
          fill="url(#bgGradient)" stroke="#887050" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Inner rim -->
    <ellipse cx="0" cy="-2" rx="28" ry="38" fill="none" stroke="#887050" stroke-width="2"/>

    <!-- String pattern - hand-drawn vertical lines -->
    <line x1="-20" y1="-36" x2="-20" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-10" y1="-40" x2="-10" y2="36" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="-41" x2="0" y2="37" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="-40" x2="10" y2="36" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="20" y1="-36" x2="20" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>

    <!-- String pattern - hand-drawn horizontal lines -->
    <line x1="-24" y1="-28" x2="24" y2="-28" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-26" y1="-14" x2="26" y2="-14" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-27" y1="0" x2="27" y2="0" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-26" y1="14" x2="26" y2="14" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-24" y1="28" x2="24" y2="28" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Handle with hand-drawn curves -->
    <path d="M -5,42 L -6,90 Q -6,96 0,96 Q 6,96 6,90 L 5,42"
          fill="#A89878" stroke="#887050" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Handle grip lines -->
    <line x1="-4" y1="52" x2="4" y2="52" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="62" x2="4" y2="62" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="72" x2="4" y2="72" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="82" x2="4" y2="82" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Right tennis racket (hand-drawn style) -->
  <g transform="translate(290, 150) rotate(20)">
    <!-- Racket head - slightly imperfect oval -->
    <path d="M -35,-2 Q -36,-20 -32,-38 Q -20,-48 0,-49 Q 20,-48 32,-38 Q 36,-20 35,-2 Q 36,16 32,34 Q 20,44 0,45 Q -20,44 -32,34 Q -36,16 -35,-2"
          fill="url(#bgGradient)" stroke="#887050" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Inner rim -->
    <ellipse cx="0" cy="-2" rx="28" ry="38" fill="none" stroke="#887050" stroke-width="2"/>

    <!-- String pattern - hand-drawn vertical lines -->
    <line x1="-20" y1="-36" x2="-20" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-10" y1="-40" x2="-10" y2="36" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="-41" x2="0" y2="37" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="-40" x2="10" y2="36" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="20" y1="-36" x2="20" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>

    <!-- String pattern - hand-drawn horizontal lines -->
    <line x1="-24" y1="-28" x2="24" y2="-28" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-26" y1="-14" x2="26" y2="-14" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-27" y1="0" x2="27" y2="0" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-26" y1="14" x2="26" y2="14" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-24" y1="28" x2="24" y2="28" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Handle with hand-drawn curves -->
    <path d="M -5,42 L -6,90 Q -6,96 0,96 Q 6,96 6,90 L 5,42"
          fill="#A89878" stroke="#887050" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Handle grip lines -->
    <line x1="-4" y1="52" x2="4" y2="52" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="62" x2="4" y2="62" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="72" x2="4" y2="72" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="82" x2="4" y2="82" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Tennis ball (hand-drawn) -->
  <g transform="translate(200, 80)">
    <!-- Ball outline - slightly imperfect circle -->
    <circle cx="0" cy="0" r="26" fill="url(#bgGradient)" stroke="#887050" stroke-width="3" stroke-linecap="round"/>

    <!-- Ball seam curves (characteristic tennis ball lines) -->
    <path d="M -18,-12 Q -8,-22 2,-24 Q 12,-22 22,-12"
          stroke="#887050" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M -18,12 Q -8,22 2,24 Q 12,22 22,12"
          stroke="#887050" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Tennis net (hand-drawn) -->
  <g transform="translate(200, 215)">
    <!-- Net posts -->
    <line x1="-120" y1="-20" x2="-120" y2="35" stroke="#887050" stroke-width="3" stroke-linecap="round"/>
    <line x1="120" y1="-20" x2="120" y2="35" stroke="#887050" stroke-width="3" stroke-linecap="round"/>

    <!-- Top rope -->
    <path d="M -120,-20 Q -40,-18 0,-19 Q 40,-18 120,-20"
          stroke="#887050" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Net mesh - horizontal lines with slight curves -->
    <path d="M -118,-10 L 118,-10" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M -118,0 L 118,0" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M -118,10 L 118,10" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M -118,20 L 118,20" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M -118,30 L 118,30" stroke="#887050" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Net mesh - vertical lines -->
    <line x1="-90" y1="-18" x2="-90" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-60" y1="-18" x2="-60" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-30" y1="-19" x2="-30" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="-19" x2="0" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="30" y1="-19" x2="30" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="60" y1="-18" x2="60" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="90" y1="-18" x2="90" y2="32" stroke="#887050" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
