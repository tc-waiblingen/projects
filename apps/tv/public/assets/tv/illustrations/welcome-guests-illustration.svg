<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#DDD5C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0C4A8;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Face -->
  <circle cx="200" cy="150" r="70" fill="url(#bgGradient)" stroke="#887050" stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="178" cy="138" r="5" fill="#887050"/>
  <circle cx="222" cy="138" r="5" fill="#887050"/>

  <!-- Smiling mouth -->
  <path d="M 175 168 Q 200 192 225 168"
        stroke="#887050" stroke-width="4" stroke-linecap="round"/>

  <!-- Left waving hand -->
  <g transform="translate(100, 130) rotate(-20)">
    <!-- palm -->
    <path d="M -5 0 Q -5 -22 12 -22 Q 28 -22 28 0 L 28 22 Q 28 32 18 32 L 5 32 Q -5 32 -5 22 Z"
          fill="url(#bgGradient)" stroke="#887050" stroke-width="3" stroke-linejoin="round"/>
    <!-- finger separators -->
    <line x1="6" y1="-15" x2="6" y2="8" stroke="#887050" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="-18" x2="17" y2="8" stroke="#887050" stroke-width="2" stroke-linecap="round"/>
    <!-- wrist -->
    <line x1="0" y1="32" x2="-12" y2="48" stroke="#887050" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="32" x2="14" y2="50" stroke="#887050" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Left motion arcs -->
  <path d="M 60 110 Q 50 122 55 138" stroke="#887050" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 50 100 Q 36 120 42 142" stroke="#887050" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right waving hand -->
  <g transform="translate(300, 130) rotate(20)">
    <path d="M 5 0 Q 5 -22 -12 -22 Q -28 -22 -28 0 L -28 22 Q -28 32 -18 32 L -5 32 Q 5 32 5 22 Z"
          fill="url(#bgGradient)" stroke="#887050" stroke-width="3" stroke-linejoin="round"/>
    <line x1="-6" y1="-15" x2="-6" y2="8" stroke="#887050" stroke-width="2" stroke-linecap="round"/>
    <line x1="-17" y1="-18" x2="-17" y2="8" stroke="#887050" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="32" x2="12" y2="48" stroke="#887050" stroke-width="3" stroke-linecap="round"/>
    <line x1="-22" y1="32" x2="-14" y2="50" stroke="#887050" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Right motion arcs -->
  <path d="M 340 110 Q 350 122 345 138" stroke="#887050" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 350 100 Q 364 120 358 142" stroke="#887050" stroke-width="2.5" stroke-linecap="round"/>
</svg>
