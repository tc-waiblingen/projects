<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Gradient for backgrounds -->
    <radialGradient id="bgGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#DDD5C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0C4A8;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Connection lines (drawn first, behind nodes) -->
  <g>
    <!-- Line to top-left node -->
    <line x1="200" y1="150" x2="90" y2="90" stroke="#887050" stroke-width="3" stroke-linecap="round"/>

    <!-- Line to right node -->
    <line x1="200" y1="150" x2="320" y2="140" stroke="#887050" stroke-width="3" stroke-linecap="round"/>

    <!-- Line to bottom-left node -->
    <line x1="200" y1="150" x2="130" y2="240" stroke="#887050" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Top-left sponsor node (medium) -->
  <g transform="translate(90, 90)">
    <circle cx="0" cy="0" r="28" fill="url(#bgGradient)" stroke="#887050" stroke-width="3"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#887050" stroke-width="2"/>
  </g>

  <!-- Right sponsor node (large) -->
  <g transform="translate(320, 140)">
    <circle cx="0" cy="0" r="35" fill="url(#bgGradient)" stroke="#887050" stroke-width="3"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#887050" stroke-width="2"/>
  </g>

  <!-- Bottom-left sponsor node (small) -->
  <g transform="translate(130, 240)">
    <circle cx="0" cy="0" r="22" fill="url(#bgGradient)" stroke="#887050" stroke-width="3"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#887050" stroke-width="2"/>
  </g>

  <!-- Central node (larger) -->
  <g transform="translate(200, 150)">
    <circle cx="0" cy="0" r="45" fill="url(#bgGradient)" stroke="#887050" stroke-width="3"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#887050" stroke-width="2.5"/>
  </g>
</svg>
