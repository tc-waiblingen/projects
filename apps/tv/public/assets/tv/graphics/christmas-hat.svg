<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
            <linearGradient id="hatRed" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#ff3333;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
            </linearGradient>

            <radialGradient id="fluffWhite" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#e6e6e6;stop-opacity:1" />
            </radialGradient>

            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
                  <feOffset dx="1" dy="2" />
                  <feComponentTransfer>
                        <feFuncA type="linear" slope="0.2" />
                  </feComponentTransfer>
                  <feMerge>
                        <feMergeNode />
                        <feMergeNode in="SourceGraphic" />
                  </feMerge>
            </filter>
      </defs>

      <!-- Red Hat Body -->
      <!-- This path creates a base that sits behind the brim and curves over to the right -->
      <path d="M 50 150 
           C 50 80, 80 30, 120 30 
           C 150 30, 180 60, 180 90 
           C 180 110, 160 110, 150 100 
           C 140 90, 150 150, 150 150 
           Z" fill="url(#hatRed)" filter="url(#softShadow)" />

      <!-- Fluffy Brim -->
      <!-- Created with a series of overlapping circles for a "cloud" effect -->
      <g fill="url(#fluffWhite)" filter="url(#softShadow)">
            <circle cx="50" cy="155" r="18" />
            <circle cx="75" cy="150" r="20" />
            <circle cx="100" cy="155" r="22" />
            <circle cx="125" cy="150" r="20" />
            <circle cx="150" cy="155" r="18" />
      </g>

      <!-- Pom-pom -->
      <g filter="url(#softShadow)">
            <circle cx="180" cy="95" r="18" fill="url(#fluffWhite)" />
            <!-- Small highlight for texture -->
            <circle cx="175" cy="90" r="8" fill="white" opacity="0.4" />
      </g>
</svg>