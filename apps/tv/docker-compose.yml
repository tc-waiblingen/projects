services:
  web:
    build:
      context: ../..  # Monorepo root
      dockerfile: apps/tv/Dockerfile
      args:
        - NEXT_PUBLIC_DIRECTUS_URL=${NEXT_PUBLIC_DIRECTUS_URL}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        - NEXT_PUBLIC_ENABLE_VISUAL_EDITING=${NEXT_PUBLIC_ENABLE_VISUAL_EDITING}
        - EBUSY_API_URL=${EBUSY_API_URL}
      secrets:
        - DIRECTUS_TOKEN
        - DIRECTUS_PUBLIC_TOKEN
        - DIRECTUS_FORM_TOKEN
        - DRAFT_MODE_SECRET
        - INSTAGRAM_ACCESS_TOKEN
        - INSTAGRAM_USER_ID
        - URL_SIGNING_SECRET
        - EBUSY_API_USER
        - EBUSY_API_PASSWORD
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DIRECTUS_TOKEN=${DIRECTUS_TOKEN}
      - DIRECTUS_PUBLIC_TOKEN=${DIRECTUS_PUBLIC_TOKEN}
      - DIRECTUS_FORM_TOKEN=${DIRECTUS_FORM_TOKEN}
      - DRAFT_MODE_SECRET=${DRAFT_MODE_SECRET}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - INSTAGRAM_USER_ID=${INSTAGRAM_USER_ID}
      - URL_SIGNING_SECRET=${URL_SIGNING_SECRET}
      - EBUSY_API_URL=${EBUSY_API_URL}
      - EBUSY_API_USER=${EBUSY_API_USER}
      - EBUSY_API_PASSWORD=${EBUSY_API_PASSWORD}
    env_file:
      - .env

secrets:
  DIRECTUS_TOKEN:
    environment: DIRECTUS_TOKEN
  DIRECTUS_PUBLIC_TOKEN:
    environment: DIRECTUS_PUBLIC_TOKEN
  INSTAGRAM_ACCESS_TOKEN:
    environment: INSTAGRAM_ACCESS_TOKEN
  INSTAGRAM_USER_ID:
    environment: INSTAGRAM_USER_ID
  URL_SIGNING_SECRET:
    environment: URL_SIGNING_SECRET
  EBUSY_API_USER:
    environment: EBUSY_API_USER
  EBUSY_API_PASSWORD:
    environment: EBUSY_API_PASSWORD
